standalone: true
toc: true
toc-depth: 3
number-sections: true
pdf-engine: xelatex
highlight-style: tango
resource-path:
  - .
  - notes
  - images
variables:
  documentclass: article
  papersize: a4
  fontsize: 11pt
  geometry:
    - margin=25mm
  colorlinks: true
  linkcolor: PolarisBlue
  urlcolor: PolarisBlue
  citecolor: PolarisBlue
  linestretch: 1.08
include-in-header:
  - pandoc/polaris.tex
